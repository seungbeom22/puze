<script>
// --- 핵심 수정: 점수 및 상점 데이터 초기화 로직 ---
function saveData() {
  const data = { score, coins, hints, moves, bestScore };
  localStorage.setItem('gemMatch', JSON.stringify(data));
}

function loadData() {
  const d = localStorage.getItem('gemMatch');
  if (!d) return false;
  try {
    const s = JSON.parse(d);
    score = s.score || 0;
    coins = s.coins || 0;
    hints = s.hints ?? 3;
    moves = s.moves ?? 30;
    bestScore = s.bestScore || 0;
    return true;
  } catch(e) { 
    console.error("데이터 로드 실패:", e);
    return false; 
  }
}

// 상점 기능 강제 연결
function openShop() {
  document.getElementById('shopCoins').textContent = coins;
  document.getElementById('shopModal').classList.add('open');
}
function closeShop() {
  document.getElementById('shopModal').classList.remove('open');
}

// 점수 저장 로직 강화
function updateScore(points) {
  score += points;
  if (score > bestScore) {
    bestScore = score;
  }
  updateUI();
  saveData();
}

// 상점 구매 기능 수정
function buyItem(type) {
  if (type === 'boom') {
    if (coins < 80) { alert('코인이 부족해요!'); return; }
    coins -= 80;
    coins += 100; // 보너스
    document.getElementById('msg').textContent = '💥 물약 사용 완료!';
  } else if (type === 'hint') {
    if (coins < 25) { alert('코인이 부족해요!'); return; }
    coins -= 25;
    hints++;
    document.getElementById('msg').textContent = '💡 힌트 추가됨!';
  }
  updateUI();
  saveData();
  document.getElementById('shopCoins').textContent = coins;
}

// 시작 시 데이터가 깨졌으면 초기화
if (!loadData()) {
  newGame();
} else {
  updateUI();
  render();
}
</script>
