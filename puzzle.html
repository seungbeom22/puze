<!DOCTYPE html>
<html>
<body>
    <h1>매치-3 콘솔 테스트</h1>
    <p>브라우저 개발자 도구(F12)의 '콘솔' 탭을 확인하세요!</p>

    <script>
        // 1. 6x6 게임판 (0: 빈칸)
        let board = [
            [1, 2, 1, 3, 4, 1],
            [2, 2, 2, 1, 2, 3], 
            [3, 1, 4, 2, 3, 4],
            [4, 3, 2, 1, 1, 2],
            [1, 2, 3, 4, 4, 4],
            [2, 4, 1, 3, 2, 1]
        ];

        function findMatches(grid) {
            let matches = [];
            // 가로 확인
            for (let r = 0; r < grid.length; r++) {
                for (let c = 0; c < grid[r].length - 2; c++) {
                    if (grid[r][c] !== 0 && grid[r][c] === grid[r][c+1] && grid[r][c] === grid[r][c+2]) {
                        matches.push({r, c}, {r, c: c+1}, {r, c: c+2});
                    }
                }
            }
            // 세로 확인
            for (let c = 0; c < grid[0].length; c++) {
                for (let r = 0; r < grid.length - 2; r++) {
                    if (grid[r][c] !== 0 && grid[r][c] === grid[r+1][c] && grid[r][c] === grid[r+2][c]) {
                        matches.push({r, c}, {r: r+1, c}, {r: r+2, c});
                    }
                }
            }
            return matches;
        }

        // 실행 로직
        console.log("초기 게임판:", JSON.parse(JSON.stringify(board)));
        let matches = findMatches(board);
        
        matches.forEach(pos => {
            board[pos.r][pos.c] = 0; // 매치된 곳 삭제
        });

        console.log("매치 삭제 후:", board);
    </script>
</body>
</html>
